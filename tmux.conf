# roostr — Claude Code session manager
# Capital letters used for roostr shortcuts so default tmux bindings on
# lowercase keys (e.g. `n` = next-window, `r` = redraw) are preserved.
bind G display-popup -E -w 80% -h 60% "roostr"
bind N display-popup -E -w 80% -h 60% "roostr new"
bind i run-shell "roostr next"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind e run-shell "roostr dock-focus"
bind E run-shell "roostr dock-toggle"

# Auto-spawn the dock sidebar on every new window, so it feels global.
# `roostr dock` sets its own pane title to "roostr-dock" via OSC, so the
# dock-toggle command can find/kill it later regardless of which pane it
# was spawned from.
set-hook -g after-new-window 'split-window -h -l 9 -d "roostr dock"'
set-hook -g session-created  'split-window -h -l 9 -d "roostr dock"'
