# roostr — Claude Code session manager
# Lowercase `a` (unbound by default) and capital letters chosen to avoid
# clobbering default tmux bindings (e.g. `n` = next-window, `r` = redraw).
# Window-based dashboard: opens a `roostr` tmux window the first time,
# focuses it on subsequent presses, and closes it if already focused.
bind a run-shell "roostr toggle"
bind N display-popup -E -w 80% -h 60% "roostr new"
bind i run-shell "roostr next"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind e run-shell "roostr dock-focus"
bind E run-shell "roostr dock-toggle"
