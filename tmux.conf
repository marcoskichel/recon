# recon — Claude Code session manager
bind g display-popup -E -w 80% -h 60% "recon"
bind n display-popup -E -w 80% -h 60% "recon new"
bind r display-popup -E -w 80% -h 60% "recon resume"
bind i run-shell "recon next"
bind X confirm-before -p "Kill session #S? (y/n)" kill-session
bind e run-shell "recon dock-toggle"
bind E run-shell "recon dock-focus"

# Auto-spawn the dock sidebar on every new window, so it feels global.
# `recon dock` sets its own pane title to "recon-dock" via OSC, so the
# dock-toggle command can find/kill it later regardless of which pane it
# was spawned from.
set-hook -g after-new-window 'split-window -h -l 9 -d "recon dock"'
set-hook -g session-created  'split-window -h -l 9 -d "recon dock"'
